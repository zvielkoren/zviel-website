name = "zviel-website"
compatibility_date = "2026-05-01"       # Or your current date
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".open-next"

[[d1_databases]]
binding = "DB"
database_name = "zviel-website-db"
database_id = "9b4a91e8-b258-4a5c-b672-b863d1207550"

# Non-secret environment variables accessible at runtime via getCloudflareContext().env
# For Cloudflare Pages, these are also configurable in the dashboard under Settings → Environment variables
[vars]
NODE_VERSION = "24.0.0"
#ADMIN_USERNAME = "admin"
HOST_VERSIONS_API = "https://zviel.com/api/versions"
# Secrets (set via dashboard or `wrangler pages secret put <NAME>`):
#   GITHUB_TOKEN
#   ADMIN_PASSWORD
#   JWT_SECRET
#   NEXT_PUBLIC_EMAILJS_SERVICE_ID
#   NEXT_PUBLIC_EMAILJS_TEMPLATE_ID
#   NEXT_PUBLIC_EMAILJS_USER_ID
#   CLOUDFLARE_API_TOKEN
